spring.application.name=backend

# 首次安装完成标记（存在则跳过向导）
xxgkami.setup.marker-file=data/.xxgkami-setup.complete
xxgkami.setup.version-file=data/.xxgkami-version.json
xxgkami.setup.mysql56-cache-file=data/.xxgkami-kami-mysql56.sql
xxgkami.setup.mysql56-cache-meta-file=data/.xxgkami-kami-mysql56.meta
xxgkami.update.gitee-version-json=https://gitee.com/xiaoxiaoguai-yyds/xxgkami-pro/raw/master/public/version.json
xxgkami.update.github-version-json=https://raw.githubusercontent.com/xxg-yyds/xxgkami-pro/refs/heads/master/public/version.json
xxgkami.update.cache-dir=data/.xxgkami-update-cache
xxgkami.update.backend-jar-path=
xxgkami.update.frontend-dist-path=
xxgkami.update.backend-jar-names=backend-0.0.1-SNAPSHOT.jar,backend.jar
xxgkami.update.backend-jar-prefix=backend-0.0.1-SNAPSHOT
xxgkami.update.frontend-dist-dir-name=dist
xxgkami.update.path-search-depth=5
# 宝塔等环境优先扫描的部署根目录（逗号分隔，会再扫描其下一级站点目录）
xxgkami.update.deploy-roots=/www/wwwroot

# 数据库配置（生产环境请以 install.sh 安装时填入的 MySQL root 为准，脚本会在 mvn package 前重写下面两行并打入 JAR）
spring.datasource.url=jdbc:mysql://localhost:3306/kami?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=haoxuan050515
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 服务器配置
# 如果不使用 Nginx，Java 直接监听 8080，则访问地址为 http://域名:8080/api/...
# 如果想直接通过 http://域名/api/... 访问，需要将端口改为 80
server.port=8080
server.servlet.context-path=/api

# 字符编码配置
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# 跨域配置
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Session：表名 spring_session（由 HttpSessionConfig + schema/spring-session-mysql.sql 初始化，不用默认 SPRING_SESSION）
spring.session.store-type=jdbc
spring.session.timeout=30m
spring.session.jdbc.table-name=spring_session
spring.session.jdbc.initialize-schema=never
# 启动时优先创建 spring_session（早于 Session 清理任务）
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema/spring-session-mysql.sql
spring.sql.init.continue-on-error=true

# 日志配置
logging.level.org.xxg.backend=DEBUG
logging.level.org.springframework.web=DEBUG
logging.file.name=logs/backend.log

# JSON配置
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Shanghai

# Tomcat Relaxed Query Chars
server.tomcat.relaxed-query-chars={,},[,],|
# 反向代理后正确识别 X-Forwarded-For / X-Real-IP
server.forward-headers-strategy=framework

# Redis配置
spring.data.redis.host=localhost
spring.data.redis.port=6379
#spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=3000
